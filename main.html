<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Grofers Checkout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <table id="grocery-table">
        <thead>
            <tr>
                <th>Item</th>
                <th>Price</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td class="item">Apples</td>
                <td class="prices">10.50</td>
            </tr>
            <tr>
                <td class="item">Bread</td>
                <td class="prices">2.30</td>
            </tr>
            <tr>
                <td class="item">Milk</td>
                <td class="prices">3.20</td>
            </tr>
        </tbody>
    </table>

    <button id="calculate-btn">Calculate Total</button>

    <script src="script.js"></script>
</body>
</html>
