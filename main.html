<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Grofers Checkout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <table>
        <thead>
            <tr>
                <th>Item</th>
                <th>Price</th>
            </tr>
        </thead>
        <tbody id="table-body">
            <tr>
                <td class="item">Item 1</td>
                <td class="prices">10</td>
            </tr>
            <tr>
                <td class="item">Item 2</td>
                <td class="prices">20</td>
            </tr>
            <tr>
                <td class="item">Item 3</td>
                <td class="prices">30</td>
            </tr>
            <tr>
                <td class="item">Item 4</td>
                <td class="prices">40</td>
            </tr>
            <tr>
                <td class="item">Item 5</td>
                <td class="prices">50</td>
            </tr>
        </tbody>
    </table>

    <button id="btn">Calculate Total</button>

    <script src="script.js"></script>
</body>
</html>
