<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grofers Checkout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>Grocery List</h2>
    <table id="grocery-table">
        <thead>
            <tr>
                <th>Item</th>
                <th>Price (₹)</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td class="item">Basmati Rice</td>
                <td class="price">100</td>
            </tr>
            <tr>
                <td class="item">Cooking Oil</td>
                <td class="price">180</td>
            </tr>
            <tr>
                <td class="item">Sugar</td>
                <td class="price">45</td>
            </tr>
            <tr>
                <td class="item">Tea Powder</td>
                <td class="price">125</td>
            </tr>
        </tbody>
    </table>

    <button id="calculate-btn">Calculate Total</button>

    <script src="script.js"></script>
</body>
</html>
